name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: kernel tests
        run: cargo test -p kernel

  bundle:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: windows-latest
          - platform: macos-latest # arm64 (M1+)
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm --prefix ui install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # on tag pushes, also create a draft GitHub release with the bundles
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && 'v__VERSION__' || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'Glossa v__VERSION__' || '' }}
          releaseDraft: true

      - name: upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: glossa-${{ matrix.platform }}
          path: |
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.dmg
          if-no-files-found: ignore
