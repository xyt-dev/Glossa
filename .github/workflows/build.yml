name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: kernel tests
        run: cargo test -p kernel

  bundle:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: windows-latest
          - platform: macos-latest # arm64 (M1+)
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        # 不用 npm --prefix：Windows 上会错误地在仓库根找 package.json
        run: npm install
        working-directory: ui

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # push 一个 v* tag 即会创建 Release，并把三平台安装包作为附件上传。
          # 用实际 push 的 tag 名，保证 release 的 tag 与之一致。
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Glossa {0}', github.ref_name) || '' }}
          releaseBody: |
            ## 安装

            **Linux / macOS** — 一行命令（重复运行即更新到最新版）：
            ```sh
            curl -fsSL https://raw.githubusercontent.com/xyt-dev/Glossa/master/install.sh | sh
            ```

            **Windows** — 下载下方 `.msi` 或 `-setup.exe` 双击安装（Win10 需 WebView2，安装器会引导）。

            完整更新说明见 [CHANGELOG](https://github.com/xyt-dev/Glossa/blob/master/CHANGELOG.md)。
          releaseDraft: true
          prerelease: false

      - name: upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: glossa-${{ matrix.platform }}
          path: |
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.dmg
          if-no-files-found: ignore
